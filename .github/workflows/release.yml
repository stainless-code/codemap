# [Changesets](https://github.com/changesets/changesets): open a "Version packages" PR when
# `.changeset/*.md` files land on `main`, then publish to npm when that PR merges (requires `NPM_TOKEN`).
name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Publish runs via Node/npm (not Bun): changesets/action invokes the publish command with
      # @actions/exec, which must match `npx changeset publish` / local CLI behavior. Using
      # `bun run release` here has caused exit 1 on no-op pushes (docs-only merges) when nothing
      # is published — Bun’s subprocess exit handling can differ from Node for @changesets/cli.
      - name: Setup Node (Changesets publish)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Opens/updates the Version PR when `.changeset/*.md` exist; when there are none, still runs
      # `changeset publish` to release a version PR merge — that path must exit 0 when there is
      # nothing new (normal for merges without a release). Requires NPM_TOKEN for real publishes.
      # See https://github.com/changesets/action/blob/main/src/index.ts
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
